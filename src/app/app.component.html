<div>
	<mat-form-field>
		<mat-label>Brand</mat-label>
		<mat-select value="value">
			<mat-option (click)="changeTheme('food')" value="Food">Food</mat-option>
			<mat-option (click)="changeTheme('blue')" value="Blue">Blue</mat-option>
		</mat-select>
	</mat-form-field>
	<div>
		<mat-slide-toggle [checked]="darkmode" (change)="changeBrand($event)">Dark mode</mat-slide-toggle>
	</div>
</div>

	<app-top-nav></app-top-nav>
	<app-recipe *ngFor="let item of recipe" [recipe]="item"></app-recipe>
