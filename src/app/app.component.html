<div class="fakeFrame" [ngClass]="dark ? 'theme--dark' : 'theme--light'" >
	<app-top-nav></app-top-nav>
	<app-recipe *ngFor="let item of recipe" [recipe]="item"></app-recipe>
	<select class="custom-select" [(ngModel)]='select' (change)="changeTheme($event)">
		<option selected>Choose Theme...</option>
		<option value="theme--light">Light</option>
		<option value="theme--dark">Dark</option>
	</select>
</div>
