<div class="recipe" *ngIf="recipe">
	<div class="header">
		<h1>{{ recipe.title }}</h1>
		<div class="category-time-container">
			<div class="category">
				<mat-icon>category</mat-icon> {{ recipe.category }}
			</div>
			<div class="time">
				<mat-icon>schedule</mat-icon> {{ recipe.preparationTime }}
			</div>
		</div>
		
	</div>
	
	<p>
	
	</p>
	<div *ngFor="let ingredient of recipe.ingredients">
		{{ ingredient.name }} {{ ingredient.amount }}
	</div>
</div>
