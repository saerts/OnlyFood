<div class="recipe" *ngIf="recipe">
	<div class="header">
		<h1>{{ recipe.title }}</h1>
		<div class="category-time-container">
			<div class="category">
			
			</div>
		</div>
	</div>
	
	<p>
		{{ recipe.category }}
	</p>
	<div *ngFor="let ingredient of recipe.ingredients">
		{{ ingredient.name }} {{ ingredient.amount }}
	</div>
</div>
